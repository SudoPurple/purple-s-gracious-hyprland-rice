# Don't print a newline before the prompt
add_newline = false

# Individual rounded pill/capsule configuration
format = """
[¯éÂ](fg:#3B4252)[$username$hostname](bg:#3B4252 fg:#ECEFF4)[¯é┤](fg:#3B4252) \
[¯éÂ](fg:#4C566A)[$directory](bg:#4C566A fg:#ECEFF4)[¯é┤](fg:#4C566A) \
[¯éÂ](fg:#5E81AC)[$git_branch$git_status](bg:#5E81AC fg:#ECEFF4)[¯é┤](fg:#5E81AC) \
$line_break\
[ÔØ»](bold green) """

# Username configuration
[username]
show_always = true
style_user = "bg:#3B4252 fg:#ECEFF4"
style_root = "bg:#3B4252 fg:#BF616A"
format = "$user"
disabled = false

# Hostname configuration
[hostname]
ssh_only = false
style = "bg:#3B4252 fg:#ECEFF4"
format = "@$hostname"
disabled = false

# Directory configuration
[directory]
style = "bg:#4C566A fg:#ECEFF4"
format = "$path"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

# Directory substitutions for clean icons
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

# Git branch configuration
[git_branch]
symbol = "¯£Ñ "
style = "bg:#5E81AC fg:#ECEFF4"
format = "$symbol$branch"
disabled = false

# Git status configuration
[git_status]
style = "bg:#5E81AC fg:#ECEFF4"
format = "([\\[$all_status$ahead_behind\\]])"
