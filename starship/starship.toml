# Don't print a newline before the prompt
add_newline = false

# Clean, text-only universal format (no background blocks, matches any theme!)
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

# Username style (green)
[username]
show_always = true
format = "[$user](bold green)"
disabled = false

# Hostname style (blue)
[hostname]
ssh_only = false
format = "@[$hostname](bold blue) "
disabled = false

# Directory style (cyan)
[directory]
truncation_length = 3
truncation_symbol = "…/"
format = "[$path](bold cyan) "

# Git branch style (magenta)
[git_branch]
symbol = " "
format = "on [$symbol$branch](bold magenta) "
disabled = false

# Git status style (red)
[git_status]
format = "([\\[$all_status$ahead_behind\\]](bold red) )"

# Input prompt character (green arrow)
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
