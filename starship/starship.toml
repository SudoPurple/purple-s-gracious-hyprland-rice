# Don't print a newline before the prompt
add_newline = false

# Custom block-based prompt (solid bars without font-breaking triangles)
format = """
[ $username$hostname ](bg:#3B4252 fg:#ECEFF4)\
[ $directory ](bg:#4C566A fg:#ECEFF4)\
[ $git_branch$git_status ](bg:#5E81AC fg:#ECEFF4) \
$line_break\
[ÔØ»](bold green) """

# Username configuration
[username]
show_always = true
style_user = "bg:#3B4252 fg:#ECEFF4"
style_root = "bg:#3B4252 fg:#BF616A"
format = "$user"
disabled = false

# Hostname configuration
[hostname]
ssh_only = false
style = "bg:#3B4252 fg:#ECEFF4"
format = "@$hostname"
disabled = false

# Directory configuration
[directory]
style = "bg:#4C566A fg:#ECEFF4"
format = "$path"
truncation_length = 3
truncation_symbol = "ÔÇª/"

# Directory substitutions for clean icons
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

# Git branch configuration
[git_branch]
symbol = "¯£Ñ "
style = "bg:#5E81AC fg:#ECEFF4"
format = "$symbol$branch"
disabled = false

# Git status configuration
[git_status]
style = "bg:#5E81AC fg:#ECEFF4"
format = "([\\[$all_status$ahead_behind\\]])"
